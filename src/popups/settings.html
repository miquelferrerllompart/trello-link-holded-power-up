<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configurar Holded</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 12px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #172b4d; margin-bottom: 4px; }
    input { width: 100%; padding: 8px; border: 1px solid #dfe1e6; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
    button { margin-top: 12px; width: 100%; padding: 8px; background: #0079bf; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
    button:hover { background: #026aa7; }
    .status { margin-top: 8px; font-size: 13px; color: #00875a; text-align: center; }
  </style>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <label for="apiKey">API Key de Holded</label>
  <input type="password" id="apiKey" placeholder="Introduce tu API Key de Holded" />
  <button id="save">Guardar</button>
  <div class="status" id="status"></div>
  <script type="module" src="./settings.ts"></script>
</body>
</html>
