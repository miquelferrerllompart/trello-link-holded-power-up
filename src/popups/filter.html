<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filtrar por Holded</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 8px;
      background: transparent;
      color: #172b4d;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #626f86;
      padding: 8px 8px 4px;
    }
    .search-box {
      width: 100%;
      padding: 8px 10px;
      border: none;
      border-radius: 3px;
      font-size: 14px;
      box-sizing: border-box;
      background: #091e420f;
      color: inherit;
      outline: none;
      transition: background 0.2s;
      margin-bottom: 4px;
    }
    .search-box:focus {
      background: #fff;
      box-shadow: inset 0 0 0 2px #0079bf;
    }
    .search-box::placeholder { color: #626f86; }
    .options {
      max-height: 200px;
      overflow-y: auto;
    }
    .option-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.1s;
      font-size: 14px;
    }
    .option-item:hover { background: #091e420f; }
    .option-item.selected { background: #e9f2ff; }
    .option-check {
      width: 16px;
      height: 16px;
      border: 2px solid #dfe1e6;
      border-radius: 2px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .option-item.selected .option-check {
      background: #0079bf;
      border-color: #0079bf;
    }
    .option-item.selected .option-check::after {
      content: '';
      width: 8px;
      height: 4px;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(-45deg) translateY(-1px);
    }
    .option-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .loading, .empty {
      padding: 12px;
      text-align: center;
      color: #626f86;
      font-size: 13px;
    }
    .tab-bar {
      display: flex;
      gap: 0;
      margin-bottom: 8px;
      border-bottom: 1px solid #091e4224;
    }
    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      color: #626f86;
      transition: color 0.1s, border-color 0.1s;
    }
    .tab:hover { color: #172b4d; }
    .tab.active {
      color: #0079bf;
      border-bottom-color: #0079bf;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    @media (prefers-color-scheme: dark) {
      body { color: #b6c2cf; }
      .section-title { color: #8c9bab; }
      .search-box { background: #22272b; color: #b6c2cf; }
      .search-box:focus { background: #22272b; box-shadow: inset 0 0 0 2px #579dff; }
      .search-box::placeholder { color: #8c9bab; }
      .option-item:hover { background: #a6c5e229; }
      .option-item.selected { background: #09326c; }
      .option-check { border-color: #596773; }
      .option-item.selected .option-check { background: #579dff; border-color: #579dff; }
      .loading, .empty { color: #8c9bab; }
      .tab-bar { border-bottom-color: #a6c5e229; }
      .tab { color: #8c9bab; }
      .tab:hover { color: #b6c2cf; }
      .tab.active { color: #579dff; border-bottom-color: #579dff; }
    }
  </style>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <div class="tab-bar">
    <div class="tab active" data-tab="contacts">Clientes</div>
    <div class="tab" data-tab="projects">Proyectos</div>
  </div>

  <div class="tab-content active" id="tab-contacts">
    <input type="text" class="search-box" id="search-contacts" placeholder="Buscar cliente..." autofocus />
    <div class="options" id="options-contacts"></div>
  </div>

  <div class="tab-content" id="tab-projects">
    <input type="text" class="search-box" id="search-projects" placeholder="Buscar proyecto..." />
    <div class="options" id="options-projects"></div>
  </div>

  <script type="module" src="./filter.ts"></script>
</body>
</html>
