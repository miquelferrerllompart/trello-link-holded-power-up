<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holded Info</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 8px;
      font-size: 14px;
      background: transparent;
      color: #172b4d;
    }
    @media (prefers-color-scheme: dark) {
      body { color: #b6c2cf; }
      .label { color: #9fadbc; }
      .value { color: #b6c2cf; }
      .row { border-bottom-color: #3d474f; }
    }
    .row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #e0e0e0; }
    .row:last-child { border-bottom: none; }
    .label { color: #6b778c; font-size: 12px; }
    .value { font-weight: 500; display: block; }
    .link { color: #0079bf; text-decoration: none; }
    .link:hover { text-decoration: underline; }
    .unlink { font-size: 12px; color: #de350b; cursor: pointer; margin-left: 8px; white-space: nowrap; }
    .unlink:hover { text-decoration: underline; }
    .empty { color: #6b778c; text-align: center; padding: 12px; }
  </style>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <div id="content"></div>
  <script type="module" src="./card-back.ts"></script>
</body>
</html>
